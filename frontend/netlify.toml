# Configuración de Netlify para monorepo
[build]
  base = "frontend"
  publish = "dist"
  command = "npm install --legacy-peer-deps && npm run build"

# Redirect para SPA (React Router)
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

# Headers de seguridad
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-XSS-Protection = "1; mode=block"
    X-Content-Type-Options = "nosniff"